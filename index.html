<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Smarters PRO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at top,#0f2027,#050505);
color:white;
}

/* APP LAYOUT */
.app{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
padding:15px;
border-left:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{
color:#00e5ff;
text-align:center;
}

.sidebar button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.06);
color:white;
cursor:pointer;
transition:.3s;
text-align:right;
}

.sidebar button:hover{
background:linear-gradient(90deg,#00e5ff,#00ff99);
color:#111;
}

/* MAIN */
.main{
flex:1;
padding:15px;
overflow:auto;
}

/* TOP BAR */
.topbar{
display:flex;
gap:10px;
margin-bottom:10px;
}

.topbar input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.06);
color:white;
}

/* PLAYER */
.player-box{
border-radius:15px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 10px 40px rgba(0,0,0,0.7);
}

/* CHANNELS */
.grid{
margin-top:15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
}

.card{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
cursor:pointer;
transition:.3s;
text-align:center;
}

.card:hover{
transform:scale(1.05);
background:linear-gradient(90deg,#00e5ff,#00ff99);
color:#111;
font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>📺 IPTV PRO</h2>
<button>🏠 Home</button>
<button>📡 Live TV</button>
<button>⭐ Favorites</button>
<button>⚙ Settings</button>
</div>

<div class="main">

<div class="topbar">
<input id="search" placeholder="🔍 Search channels...">
</div>

<div class="player-box">
<video id="player" class="video-js vjs-default-skin vjs-big-play-centered" controls></video>
</div>

<div class="grid" id="list"></div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>

<script>

/* ===== YOUR LINKS ===== */
const M3U_URL = "https://xtream-ie.net/get.php?username=serverblbas&password=serverblbas&type=m3u_plus";
const EPG_URL = "https://xtream-ie.net/xmltv.php?username=serverblbas&password=serverblbas";

/* ===== PLAYER ===== */
const player = videojs("player",{fluid:true,autoplay:true,liveui:true});

let channels=[];
let current=0;

/* ===== LOAD M3U ===== */
fetch(M3U_URL)
.then(r=>r.text())
.then(data=>{
channels=parseM3U(data);
render(channels);
play(0);
});

/* ===== PARSE M3U ===== */
function parseM3U(data){
let lines=data.split("\n");
let out=[];

for(let i=0;i<lines.length;i++){
if(lines[i].includes("#EXTINF")){
let name=lines[i].split(",")[1]||"Channel";
let url=lines[i+1];
if(url) out.push({name,url});
}
}
return out;
}

/* ===== RENDER ===== */
function render(list){
let box=document.getElementById("list");
box.innerHTML="";

list.forEach((c,i)=>{
let div=document.createElement("div");
div.className="card";
div.innerText=c.name;
div.onclick=()=>play(i);
box.appendChild(div);
});
}

/* ===== PLAY ===== */
function play(i){
current=i;
player.src({src:channels[i].url,type:"application/x-mpegURL"});
player.play();
}

/* ===== SEARCH ===== */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
});

</script>

</body>
</html>
