<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>IPTV PRO UI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #6c5ce7; --bg: #0f0f1a; --card: #1a1a2e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        
        .app { display: flex; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0a0a14; padding: 20px; border-left: 1px solid #333; }
        .logo { font-size: 22px; font-weight: bold; color: var(--accent); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-btn { width: 100%; padding: 15px; margin-bottom: 10px; background: transparent; border: none; color: #a2a2c2; text-align: right; cursor: pointer; transition: 0.3s; border-radius: 10px; }
        .nav-btn:hover, .nav-btn.active { background: var(--accent); color: white; }
        
        /* Main */
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .player-container { background: #000; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 2px solid #2d2d44; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .channel-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.4s; border: 1px solid #2d2d44; }
        .channel-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(108,92,231,0.2); }
        .channel-card i { font-size: 30px; color: var(--accent); margin-bottom: 10px; display: block; }
        
        .search-box { width: 100%; padding: 15px; border-radius: 12px; background: var(--card); border: none; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-tv"></i> IPTV PRO</div>
        <button class="nav-btn active"><i class="fas fa-home"></i> سەرەکی</button>
        <button class="nav-btn"><i class="fas fa-satellite"></i> کەناڵەکان</button>
        <button class="nav-btn"><i class="fas fa-heart"></i> دڵخوازەکان</button>
    </div>

    <div class="main">
        <input type="text" class="search-box" id="search" placeholder="🔍 بەدوای کەناڵێکدا بگەڕێ...">
        
        <div class="player-container">
            <video id="player" class="video-js vjs-big-play-centered" controls></video>
        </div>

        <div class="grid" id="list"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>
<script>
    // کۆدی پێشوو بەکارهێنراوە بۆ لۆژیکی کارکردن
    const player = videojs("player", { fluid: true, autoplay: true });
    
    // کاتێک کارتێک دروست دەکەیت، ئەم کۆدەت بەکاربهێنە بۆ جوانکردنی:
    function render(list) {
        let box = document.getElementById("list");
        box.innerHTML = "";
        list.forEach((c, i) => {
            let div = document.createElement("div");
            div.className = "channel-card";
            div.innerHTML = `<i class="fas fa-play-circle"></i><div>${c.name}</div>`;
            div.onclick = () => play(i);
            box.appendChild(div);
        });
    }
    // ... باقی کۆدەکەت لێرە زیاد بکە ...
</script>
</body>
</html>
