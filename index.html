<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kamalblbas TV - Web App</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #11141a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #00d2ff;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .video-holder {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            border: 2px solid #222b36;
            margin-bottom: 25px;
        }
        .playlist-box {
            background: #1b222c;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #2c3848;
            max-height: 400px;
            overflow-y: auto;
        }
        .channel-btn {
            background: #242f3e;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            display: inline-block;
            text-align: right;
        }
        .channel-btn:hover, .channel-btn.active {
            background: #00d2ff;
            color: #11141a;
            font-weight: bold;
            transform: scale(1.05);
        }
        .loading {
            color: #aaa;
            font-style: italic;
        }
        .ch-num {
            color: #00d2ff;
            font-weight: bold;
            margin-left: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px; /* لێرەدا پادینگی زیادە چاککراوەتەوە */
            border-radius: 4px;
        }
        .channel-btn.active .ch-num {
            color: #11141a;
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📺 سەرپەرشتیاری چەناڵەکانی kamalblbas TV</h1>
        
        <div class="video-holder">
            <video id="tv-player" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto">
            </video>
        </div>

        <div class="playlist-box">
            <h3>🗂️ لیستی کەنالەکان (باردەکرێت لە M3U)...</h3>
            <div id="channels-list" class="loading">تکایە چاوەڕوان بە، چەناڵەکان باردەکرێن...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>

    <script>
        const M3U_URL = 'https://xtream-ie.net/get.php?username=iptv2026&password=iptv2026&type=m3u_plus';
        const EPG_URL = 'https://xtream-ie.net/xmltv.php?username=iptv2026&password=iptv2026'; // لێرەدا کۆتیشنەکە چاککراوەتەوە

        const player = videojs('tv-player', { fluid: true, autoplay: false, liveui: true });
        const listContainer = document.getElementById('channels-list');
        
        let globalChannels = []; 
        let currentChannelIndex = 0; 

        function parseM3U(data) {
            const lines = data.split('\n');
            const channels = [];
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    let name = line.split(',').pop() || "Unknown Channel";
                    
                    let url = "";
                    for (let j = i + 1; j < lines.length; j++) {
                        let nextLine = lines[j].trim();
                        if (nextLine.startsWith('http')) {
                            url = nextLine;
                            break;
                        }
                        if (nextLine.startsWith('#EXTINF:')) break; 
                    }
                    
                    if (url) {
                        channels.push({ name: name, url: url });
                    }
                }
            }
            return channels;
        }

        function playChannel(index) {
            if (globalChannels.length === 0 || index < 0 || index >= globalChannels.length) return;
            
            currentChannelIndex = index;
            const ch = globalChannels[index];
            
            const buttons = document.querySelectorAll('.channel-btn');
            buttons.forEach(b => b.classList.remove('active'));
            if (buttons[index]) {
                buttons[index].classList.add('active');
                buttons[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            let type = 'application/x-mpegURL'; 
            if(ch.url.includes('.mpd') || ch.url.includes('manifest')) {
                type = 'application/dash+xml'; 
            }
            
            player.src({ src: ch.url, type: type });
            player.play().catch(e => {
                console.log("خەتا لە لێدانی ڤیدیۆ:", e);
            });
        }

        fetch(M3U_URL)
            .then(response => {
                if (!response.ok) {
                    throw new Error("Server Error");
                }
                return response.text();
            })
            .then(data => {
                globalChannels = parseM3U(data);
                listContainer.innerHTML = ""; 
                listContainer.classList.remove('loading');

                if(globalChannels.length === 0) {
                    listContainer.innerText = "هیچ چەناڵێک لە فایلەکەدا نەدۆزرایەوە.";
                    return;
                }

                globalChannels.forEach((ch, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'channel-btn';
                    btn.innerHTML = `<span class="ch-num">${index + 1}</span> ${ch.name}`;
                    btn.onclick = function() {
                        playChannel(index);
                    };
                    listContainer.appendChild(btn);
                });

                if(globalChannels.length > 0) {
                    playChannel(0);
                }
            })
            .catch(err => {
                listContainer.innerText = "خەتا لە هێنانی فایلەکە: " + err.message;
                console.error(err);
            });

        // 🎹 گوێگرتن لە کیبۆرد بۆ چوونە پێشەوە و گەڕانەوە
        window.addEventListener('keydown', function(event) {
            // ۱. ئەگەر دوگمەی سپەیس (Space) داگیرا -> بڕۆ کەنالی داهاتوو
            if (event.key === ' ' || event.keyCode === 32) {
                event.preventDefault(); 
                let nextIndex = currentChannelIndex + 1;
                if (nextIndex >= globalChannels.length) {
                    nextIndex = 0; // گەڕانەوە بۆ سەرەتا
                }
                playChannel(nextIndex);
            }
            
            // ۲. ئەگەر دوگمەی باکسبەیس (Backspace) داگیرا -> بگەڕێوە کەنالی پێشوو
            if (event.key === 'Backspace' || event.keyCode === 8) {
                event.preventDefault();
                let prevIndex = currentChannelIndex - 1;
                if (prevIndex < 0) {
                    prevIndex = globalChannels.length - 1; // ئەگەر لە سەرەتا بوو، بچێتە کۆتا کەنال
                }
                playChannel(prevIndex);
            }
        });
    </script>
</body>
</html>
