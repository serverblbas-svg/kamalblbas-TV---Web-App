<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Smarters PRO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at top,#0f2027,#050505);
color:white;
}

/* APP */
.app{display:flex;height:100vh;}

/* SIDEBAR */
.sidebar{
width:220px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:15px;
border-left:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{color:#00e5ff;text-align:center;}

.sidebar button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:transparent;
color:white;
cursor:pointer;
transition:.3s;
text-align:right;
}

.sidebar button:hover{
background:linear-gradient(90deg,#00e5ff,#00ff99);
color:#111;
}

/* MAIN */
.main{flex:1;padding:15px;overflow:auto;}

.top{
display:flex;
gap:10px;
margin-bottom:10px;
}

.top input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
}

/* PLAYER */
.player{
border-radius:15px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
}

/* CHANNELS */
.grid{
margin-top:15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:10px;
}

.card{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.06);
cursor:pointer;
transition:.3s;
text-align:center;
}

.card:hover{
transform:scale(1.05);
background:linear-gradient(90deg,#00e5ff,#00ff99);
color:#111;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>📺 IPTV PRO</h2>
<button>🏠 Home</button>
<button>📡 Live TV</button>
<button onclick="loadFav()">⭐ Favorites</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
<input id="search" placeholder="🔍 Search channels...">
</div>

<div class="player">
<video id="player" class="video-js vjs-default-skin vjs-big-play-centered" controls></video>
</div>

<div class="grid" id="list"></div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>

<script>
const player = videojs("player",{fluid:true,autoplay:true,liveui:true});

const M3U = "https://xtream-ie.net/get.php?username=serverblbas&password=serverblbas&type=m3u_plus";

let channels=[];
let current=0;
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");

fetch(M3U)
.then(r=>r.text())
.then(data=>{
channels=parse(data);
render(channels);
play(0);
});

function parse(data){
let lines=data.split("\n");
let out=[];
for(let i=0;i<lines.length;i++){
if(lines[i].includes("#EXTINF")){
let name=lines[i].split(",")[1]||"Channel";
let url=lines[i+1];
if(url) out.push({name,url});
}
}
return out;
}

function render(list){
let box=document.getElementById("list");
box.innerHTML="";

list.forEach((c,i)=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`${c.name} ⭐`;

div.onclick=()=>play(i);

div.ondblclick=()=>{
toggleFav(c);
};

box.appendChild(div);
});
}

function play(i){
current=i;
player.src({src:channels[i].url,type:"application/x-mpegURL"});
player.play();
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
});

/* FAVORITES */
function toggleFav(ch){
if(!favorites.find(f=>f.name===ch.name)){
favorites.push(ch);
}else{
favorites=favorites.filter(f=>f.name!==ch.name);
}
localStorage.setItem("fav",JSON.stringify(favorites));
}

function loadFav(){
render(favorites);
}
</script>

</body>
</html>
